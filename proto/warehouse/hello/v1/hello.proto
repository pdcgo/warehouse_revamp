syntax = "proto3";

package warehouse.hello.v1;

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/hello/v1;hellov1";

// HelloService is the scaffold service: it exists to prove the proto -> Go + TS
// pipeline works end to end. Delete it once a real domain service replaces it.
service HelloService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse) {}
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message = 1;
}
