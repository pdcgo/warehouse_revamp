syntax = "proto3";

package warehouse.expense.v1;

import "buf/validate/validate.proto";
import "warehouse/common/v1/page.proto";
import "warehouse/role_base/v1/role.proto";

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/expense/v1;expensev1";

// ExpenseService owns `expense_records` (#161) — the money the business spent that NO ORDER caused.
//
// That is the whole reason it is not part of revenue_service. A revenue row is written BY THE SYSTEM
// from an order (#153); an expense row is TYPED BY A PERSON about a period. Everything below follows from
// that one difference: the form has to be quick, the mistake has to be fixable, and the row has to say
// who entered it.
//
// Deliberately NOT here:
//   - Per-order costs. COGS and shipping are frozen onto the order (#74); marketplace and payment fees
//     per order belong beside the revenue row so settlement (#76) can compare them to a real payout.
//     Putting them here would split one order's money across two services.
//   - A ledger. No balances, no double entry — the same call revenue made (revenue §2.4). An expense row
//     records that money went out, not an account movement.
//
// See plans/expense_service/brainstorming.md.
service ExpenseService {
  // Record money that went out (#168).
  rpc ExpenseCreate(ExpenseCreateRequest) returns (ExpenseCreateResponse);
  // A team's expenses for a PERIOD, with per-kind totals (#168).
  rpc ExpenseList(ExpenseListRequest) returns (ExpenseListResponse);

  // An expense is TYPED BY A PERSON, so it is mistypeable — and therefore correctable (#169).
  rpc ExpenseUpdate(ExpenseUpdateRequest) returns (ExpenseUpdateResponse);
  // Stop an expense counting. Kept and visible, never deleted.
  rpc ExpenseVoid(ExpenseVoidRequest) returns (ExpenseVoidResponse);
}

// What KIND of spending. A proto enum rather than a team-managed category table (owner, §2.3): every
// team's numbers then mean the same thing, so "ads spend across all teams last month" has an answer.
// Two teams naming the same expense "Iklan" and "Marketing" is how cross-team reporting stops working on
// the day it is first needed.
//
// Adding a kind is a proto change — rare, deliberate, and visible in review. APPEND ONLY, like every
// enum here.
enum ExpenseKind {
  EXPENSE_KIND_UNSPECIFIED = 0;

  // Marketplace ads budget. The kind most likely to name a shop, though any kind may.
  EXPENSE_KIND_ADS = 1;

  // Wages paid to people.
  EXPENSE_KIND_PAYROLL = 2;

  // Rent, electricity, internet, subscriptions (owner, §2.1: this is what "payment" meant).
  //
  // Named OPERATIONAL rather than PAYMENT or BILL, and both rejections are worth keeping: "payment"
  // reads as a payment FEE or a payment METHOD to anyone who was not in that conversation, and a
  // "bill" is a document you receive — which a subscription charged automatically is not. All three
  // kinds now answer the same question, what kind of SPENDING.
  EXPENSE_KIND_OPERATIONAL = 3;

  // Everything else, so nothing is unrecordable while the set above is still small.
  EXPENSE_KIND_OTHER = 4;
}

// One expense. Money is whole rupiah as int64, like every other money field in this system.
message ExpenseRecord {
  uint64 id = 1;

  // WHOSE expense — the authorization scope, exactly as on a revenue row.
  //
  // ONE team per row (owner, 2026-07-21). A warehouse IS a team, so a warehouse's payroll is an expense on
  // that warehouse's team_id — and it is never recharged onward to the selling teams it fulfils for.
  // A recharge would have been a second team on this row, which is why it was asked before the
  // migration was written rather than after.
  uint64 team_id = 2;

  // OPTIONALLY which shop the money was spent on. 0 = not attributed to one shop.
  //
  // Optional on EVERY kind (owner, 2026-07-21), not just ads: a team running two shops may want to
  // split its packing wages or a subscription between them, and "only ads may name a shop" is a rule
  // somebody would hit and ask to have relaxed.
  uint64 shop_id = 3;

  ExpenseKind kind = 4;

  // Whole rupiah, ALWAYS POSITIVE. The kind already says the money is going out, so a signed amount
  // would let a negative expense silently become revenue.
  int64 amount = 5;

  // The date the expense BELONGS TO, as chosen by the person — not the moment the row was inserted.
  // Payroll is paid on the 5th for the month before, and filing it under the 5th would put it in the
  // wrong month for every report that matters. RFC3339 date (YYYY-MM-DD).
  string occurred_at = 6;

  // What it actually was. The enum says which bucket; this says which electricity bill.
  string note = 7;

  // WHO TYPED IT. A person entered this number by hand and it moves profit directly, so the row says
  // whose number it is. Opaque user_service id.
  uint64 created_by = 8;

  // Whether this row still counts (#164's pattern). An expense entered by mistake is VOIDED, not deleted:
  // a deleted row cannot tell you an expense was entered and then retracted, and somebody looking at a
  // profit figure that changed wants to see why.
  bool voided = 9;

  int64 created_at_unix = 10;
}

message ExpenseCreateRequest {
  // Write: a MANAGER's action on both sides, unlike revenue where customer service writes and
  // managers read. These numbers move profit directly, so the people already trusted to manage a team
  // are the ones who move them (owner, 2026-07-21) — no new finance role.
  //
  // TEAM_CUSTOMER_SERVICE is deliberately absent: a person taking orders has no reason to see or move
  // the payroll number.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];

  ExpenseKind kind = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // Whole rupiah, POSITIVE. Recording an expense of nothing is not an expense.
  int64 amount = 3 [(buf.validate.field).int64.gt = 0];

  // The date the expense BELONGS TO (YYYY-MM-DD), chosen by the person.
  string occurred_at = 4 [(buf.validate.field).string.pattern = "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"];

  // Optional on ANY kind. 0 = not attributed to one shop.
  uint64 shop_id = 5;

  string note = 6 [(buf.validate.field).string.max_len = 500];
}

message ExpenseCreateResponse {
  ExpenseRecord expense = 1;
}

message ExpenseListRequest {
  // Read: the same managers. Money out is not customer service's business.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (warehouse.role_base.v1.use_scope) = true,
    (buf.validate.field).uint64.gt = 0
  ];

  // Grows with every expense ever recorded, so it pages (HARD RULE 9).
  warehouse.common.v1.PageFilter page = 2 [(buf.validate.field).required = true];

  // THE PERIOD, inclusive, as YYYY-MM-DD. Both empty = every expense ever.
  //
  // Server-side, and that is the whole point of the field: the list is paginated, so a client-side
  // date filter would narrow the loaded page only and leave the totals beside it unfiltered — a
  // confidently-wrong headline figure, which is what #130/#151 settled for status filters.
  //
  // It is also what the profit screen stands on, and half of what it needs: RevenueList has no period
  // filter at all yet (#171).
  string from = 3 [(buf.validate.field).string.max_len = 10];
  string to = 4 [(buf.validate.field).string.max_len = 10];

  // One kind, or UNSPECIFIED for all of them.
  ExpenseKind kind = 5 [(buf.validate.field).enum.defined_only = true];
  // One shop, or 0 for all of them.
  uint64 shop_id = 6;
}

// What the filtered period cost, by kind and in total.
message ExpenseTotals {
  // The sum over EVERY row the filter matched, not the page — the same split RevenueTotals uses
  // (#78). A page total is a different number wearing the same label.
  int64 total = 1;

  // Per kind, so the summary cards need no second call. A kind with no expenses in the period is simply
  // absent rather than reported as 0 — absent and zero read the same on a card, and building the
  // absent ones would mean this message knowing the enum's members.
  map<int32, int64> by_kind = 2;
}

message ExpenseListResponse {
  repeated ExpenseRecord expenses = 1;
  warehouse.common.v1.PageInfo page_info = 2;
  ExpenseTotals totals = 3;
}

// ExpenseUpdate corrects an expense (#169).
//
// It exists because of the one fact that separates this service from revenue_service: a revenue row is
// written by the system from an order and frozen, while an expense row is TYPED BY A PERSON. A person
// mistypes. Refusing to let them fix it would leave a wrong number moving profit forever, and the
// workaround — void it and enter another — loses who entered the original and when.
//
// A FULL REPLACE, not a patch. The edit form is the record re-opened, so it submits every field back
// and an empty one means cleared — the same shape RestockRequestUpdate settled on (#131). A patch
// would need a way to say "leave this alone" that the form has no way to express.
message ExpenseUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (warehouse.role_base.v1.use_scope) = true,
    (buf.validate.field).uint64.gt = 0
  ];
  uint64 expense_id = 2 [(buf.validate.field).uint64.gt = 0];

  ExpenseKind kind = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  int64 amount = 4 [(buf.validate.field).int64.gt = 0];
  string occurred_at = 5 [(buf.validate.field).string.pattern = "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"];
  uint64 shop_id = 6;
  string note = 7 [(buf.validate.field).string.max_len = 500];
}

message ExpenseUpdateResponse {
  ExpenseRecord expense = 1;
}

// ExpenseVoid stops an expense counting (#169) — it was entered by mistake.
//
// VOIDED, NOT DELETED, following #164 exactly: a deleted row cannot tell you an expense was entered and
// then retracted, and somebody looking at a profit figure that changed wants to see why. The row stays
// on the list, struck through; every total excludes it.
//
// ⚠ A MISSING ROW IS NotFound HERE, unlike RevenueVoid where it is success — and the difference is who
// calls it. RevenueVoid is driven by a Pub/Sub event, so a missing row must ACK or the message is
// redelivered forever. This is a person clicking a button: if the expense is not there, or belongs to
// another team, saying so is the honest answer rather than a silent success.
message ExpenseVoidRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (warehouse.role_base.v1.use_scope) = true,
    (buf.validate.field).uint64.gt = 0
  ];
  uint64 expense_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message ExpenseVoidResponse {
  ExpenseRecord expense = 1;
}
