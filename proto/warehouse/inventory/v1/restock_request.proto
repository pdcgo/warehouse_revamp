syntax = "proto3";

package warehouse.inventory.v1;

import "buf/validate/validate.proto";
import "warehouse/common/v1/page.proto";
import "warehouse/role_base/v1/role.proto";

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/inventory/v1;inventoryv1";

// RestockRequestService (#105): a SELLING team asks a WAREHOUSE to restock a product (with shipment
// info). The warehouse team then FULFILS the request, which receives the stock into that warehouse.
// This keeps each warehouse owning its own stock — a selling team never writes stock directly.
service RestockRequestService {
  // A selling team creates a restock request (scoped to the requesting team).
  rpc RestockRequestCreate(RestockRequestCreateRequest) returns (RestockRequestCreateResponse);
  // Both sides list: a team sees requests it MADE and requests TARGETING it as a warehouse.
  rpc RestockRequestList(RestockRequestListRequest) returns (RestockRequestListResponse);
  // One request in full, with its lines — the detail page (#125). Same two-sided scope as List.
  rpc RestockRequestDetail(RestockRequestDetailRequest) returns (RestockRequestDetailResponse);
  // The requesting team edits its own request, while the warehouse has not accepted it yet (#131).
  rpc RestockRequestUpdate(RestockRequestUpdateRequest) returns (RestockRequestUpdateResponse);
  // The target warehouse fulfils a pending request — receives the stock and marks it fulfilled.
  rpc RestockRequestFulfill(RestockRequestFulfillRequest) returns (RestockRequestFulfillResponse);
  // The requesting team cancels a still-pending request.
  rpc RestockRequestCancel(RestockRequestCancelRequest) returns (RestockRequestCancelResponse);
}

enum RestockRequestStatus {
  RESTOCK_REQUEST_STATUS_UNSPECIFIED = 0;
  RESTOCK_REQUEST_STATUS_PENDING = 1;
  RESTOCK_REQUEST_STATUS_FULFILLED = 2;
  RESTOCK_REQUEST_STATUS_CANCELLED = 3;
}

// How the restock was paid for (#127). Two ways today; append-only, like every enum here.
enum RestockPaymentType {
  RESTOCK_PAYMENT_TYPE_UNSPECIFIED = 0;
  RESTOCK_PAYMENT_TYPE_SHOPEE_PAY = 1;
  RESTOCK_PAYMENT_TYPE_BANK_ACCOUNT = 2;
}

// One line of a restock request: a product, how much of it, and what it costs.
message RestockRequestItem {
  uint64 id = 1;
  uint64 product_id = 2 [(buf.validate.field).uint64.gt = 0];
  // sku/name snapshot at request time (the product may live in another team's catalogue).
  string sku = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  string name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  int64 quantity = 5 [(buf.validate.field).int64.gt = 0];
  // Whole rupiah, PER UNIT — what this product is expected to cost from the supplier. Zero is
  // legitimate (a transfer, a sample), so it is gte 0, not gt 0.
  int64 price = 6 [(buf.validate.field).int64.gte = 0];
}

message RestockRequest {
  uint64 id = 1;
  uint64 requesting_team_id = 2;
  uint64 warehouse_id = 3;
  // was product_id / sku / name / quantity — a request carries MANY priced lines now (#124).
  reserved 4, 5, 6, 7;
  reserved "product_id", "sku", "name", "quantity";
  // A shipping_service courier code (opaque) — how the goods reach the warehouse.
  string shipping_code = 8;
  RestockRequestStatus status = 9;
  int64 created_at_unix = 10;

  // The lines. At least one.
  repeated RestockRequestItem items = 11;

  // OPTIONAL context — a request is legitimate without any of it.
  //
  // was `uint64 order_id` — the order is now a free-text REFERENCE, not an id (#127): it is written
  // down from a marketplace/order somewhere else, so it was never ours to resolve, and typing one
  // that happens to be numeric never meant it pointed at a row here.
  reserved 12;
  reserved "order_id";
  // The courier's tracking number (resi) for the shipment, once there is one. Empty = none yet.
  string receipt = 13;
  // Who the goods are bought from — an inventory_service supplier owned by the REQUESTING team.
  // Same service, so this one is a real FK. 0 = no supplier recorded.
  uint64 supplier_id = 14;

  // The order this restock is FOR, as a plain reference string (#127). Empty = not tied to one.
  string order_ref = 15;
  // What the shipment itself cost, whole rupiah (#127). The goods' cost is per line (item.price);
  // this is the freight on top, and it is what the summary adds to the products' total.
  int64 shipping_cost = 16;
  // How it was paid for (#127).
  RestockPaymentType payment_type = 17;
  // A free-text note about this restock (#127).
  string note = 18;
}

message RestockRequestCreateRequest {
  // Write: the SELLING team's managers and customer service raise the request.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  // was product_id / sku / name / quantity — one product per request became `items` (#124).
  reserved 3, 4, 5, 6;
  reserved "product_id", "sku", "name", "quantity";
  string shipping_code = 7 [(buf.validate.field).string.max_len = 40];

  // At least one line; `id` on each is ignored.
  repeated RestockRequestItem items = 8 [(buf.validate.field).repeated.min_items = 1];

  // Optional context — see RestockRequest. supplier_id, when set, must be a supplier of the
  // REQUESTING team (the handler checks; a supplier from another team reads as NotFound).
  //
  // was `uint64 order_id` — the order is a free-text reference now (#127); see `order_ref`.
  reserved 9;
  reserved "order_id";
  string receipt = 10 [(buf.validate.field).string.max_len = 100];
  uint64 supplier_id = 11;

  string order_ref = 12 [(buf.validate.field).string.max_len = 100];
  // Whole rupiah. Zero is legitimate (free shipping, collected in person), so gte 0, not gt 0.
  int64 shipping_cost = 13 [(buf.validate.field).int64.gte = 0];
  RestockPaymentType payment_type = 14 [(buf.validate.field).enum.defined_only = true];
  string note = 15 [(buf.validate.field).string.max_len = 1000];
}

message RestockRequestCreateResponse {
  RestockRequest request = 1;
}

message RestockRequestListRequest {
  // Read: either side — the selling team that made requests, or the warehouse they target.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  warehouse.common.v1.PageFilter page = 2 [(buf.validate.field).required = true];

  // Filter to ONE status; UNSPECIFIED (the default) means ALL statuses — the list's tabs (#130).
  //
  // Server-side on purpose: the list is PAGINATED, so filtering the loaded page in the client would
  // show only the pending rows that happened to land in this page, and count them wrong.
  RestockRequestStatus status = 3 [(buf.validate.field).enum.defined_only = true];
}

message RestockRequestDetailRequest {
  // Read: either side, exactly as List — the selling team that made it, or the warehouse it targets.
  // A request that is neither reads as NotFound, so this cannot be used to probe other teams' ids.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 request_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message RestockRequestDetailResponse {
  RestockRequest request = 1;
}

message RestockRequestListResponse {
  repeated RestockRequest requests = 1;
  warehouse.common.v1.PageInfo page_info = 2;
}

message RestockRequestUpdateRequest {
  // Write: the requesting SELLING team edits its own request — the same people who may raise one
  // (cf. RestockRequestCreateRequest). The WAREHOUSE roles are deliberately absent: the warehouse
  // does not edit what it is being asked for, it accepts it or it does not.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE
    ]
  };

  // Scoped to the REQUESTING team: a request another team raised reads as NotFound, exactly as it
  // does for Cancel. Editing is only legal while the request is still PENDING — once the warehouse
  // has accepted (fulfilled) it, the goods have moved and the record is history, so a fulfilled or
  // cancelled request is refused with FailedPrecondition rather than quietly rewritten (#131).
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 request_id = 2 [(buf.validate.field).uint64.gt = 0];

  // A full REPLACE, not a patch — every field below mirrors RestockRequestCreateRequest, because the
  // edit screen IS the create form re-opened on an existing row. So a field left empty means the
  // person CLEARED it, and there is no "absent means keep" case to encode: what the form shows is
  // what the request becomes.
  uint64 warehouse_id = 3 [(buf.validate.field).uint64.gt = 0];
  string shipping_code = 4 [(buf.validate.field).string.max_len = 40];

  // Replaces the whole set of lines; at least one, and `id` on each is ignored (the rows are rewritten,
  // so a caller does not get to choose or preserve a line's identity).
  repeated RestockRequestItem items = 5 [(buf.validate.field).repeated.min_items = 1];

  string receipt = 6 [(buf.validate.field).string.max_len = 100];
  // Must be a supplier of the REQUESTING team, as on create; 0 clears it.
  uint64 supplier_id = 7;
  string order_ref = 8 [(buf.validate.field).string.max_len = 100];
  int64 shipping_cost = 9 [(buf.validate.field).int64.gte = 0];
  RestockPaymentType payment_type = 10 [(buf.validate.field).enum.defined_only = true];
  string note = 11 [(buf.validate.field).string.max_len = 1000];
}

message RestockRequestUpdateResponse {
  RestockRequest request = 1;
}

message RestockRequestFulfillRequest {
  // Write: only the target WAREHOUSE's staff/managers fulfil (receive the stock).
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  // The fulfilling warehouse — must equal the request's warehouse_id.
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 request_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message RestockRequestFulfillResponse {
  RestockRequest request = 1;
}

message RestockRequestCancelRequest {
  // Write: the requesting SELLING team cancels its own pending request.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 request_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message RestockRequestCancelResponse {
  RestockRequest request = 1;
}
