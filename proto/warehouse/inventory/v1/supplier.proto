syntax = "proto3";

package warehouse.inventory.v1;

import "buf/validate/validate.proto";
import "warehouse/common/v1/page.proto";
import "warehouse/role_base/v1/role.proto";

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/inventory/v1;inventoryv1";

// SupplierService owns `suppliers` — the vendors a team buys stock from (#103), managed under the
// Inventory area. Every RPC is team-scoped: `team_id` carries (use_scope) and each query is
// constrained to that team, so one team can never read or mutate another team's supplier by id.
service SupplierService {
  rpc SupplierCreate(SupplierCreateRequest) returns (SupplierCreateResponse);
  rpc SupplierList(SupplierListRequest) returns (SupplierListResponse);
  rpc SupplierDetail(SupplierDetailRequest) returns (SupplierDetailResponse);
  rpc SupplierUpdate(SupplierUpdateRequest) returns (SupplierUpdateResponse);
  rpc SupplierDelete(SupplierDeleteRequest) returns (SupplierDeleteResponse);
}

message Supplier {
  uint64 id = 1;
  uint64 team_id = 2;
  // A short stable code, unique per team among active suppliers (like a shop/team code).
  string code = 3;
  string name = 4;
  string contact = 5;
  string province = 6;
  string city = 7;
  string address = 8;
  string description = 9;
  bool deleted = 10;
}

message SupplierCreateRequest {
  // Write: the team's managers (selling/warehouse). Team-level roles are legal because team_id
  // carries use_scope.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  string code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
  string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string contact = 4 [(buf.validate.field).string.max_len = 50];
  string province = 5 [(buf.validate.field).string.max_len = 100];
  string city = 6 [(buf.validate.field).string.max_len = 100];
  string address = 7 [(buf.validate.field).string.max_len = 500];
  string description = 8 [(buf.validate.field).string.max_len = 500];
}

message SupplierCreateResponse {
  Supplier supplier = 1;
}

message SupplierListRequest {
  // Read: anyone in the team, including staff and customer service.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  string q = 2 [(buf.validate.field).string.max_len = 100];
  warehouse.common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message SupplierListResponse {
  repeated Supplier suppliers = 1;
  warehouse.common.v1.PageInfo page_info = 2;
}

message SupplierDetailRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_TEAM_CUSTOMER_SERVICE,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 supplier_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message SupplierDetailResponse {
  Supplier supplier = 1;
}

message SupplierUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 supplier_id = 2 [(buf.validate.field).uint64.gt = 0];

  // Absent = leave alone. Present = write it.
  optional string code = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
  optional string name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  optional string contact = 5 [(buf.validate.field).string.max_len = 50];
  optional string province = 6 [(buf.validate.field).string.max_len = 100];
  optional string city = 7 [(buf.validate.field).string.max_len = 100];
  optional string address = 8 [(buf.validate.field).string.max_len = 500];
  optional string description = 9 [(buf.validate.field).string.max_len = 500];
}

message SupplierUpdateResponse {
  Supplier supplier = 1;
}

message SupplierDeleteRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 supplier_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message SupplierDeleteResponse {}
