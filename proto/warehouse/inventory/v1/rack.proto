syntax = "proto3";

package warehouse.inventory.v1;

import "buf/validate/validate.proto";
import "warehouse/common/v1/page.proto";
import "warehouse/role_base/v1/role.proto";

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/inventory/v1;inventoryv1";

// RackService owns `racks` — the physical places inside ONE warehouse (#129).
//
// This is the REGISTRY only: a warehouse writes down the racks it has. Stock is still counted per
// (warehouse, product) — putting stock ON a rack is the location-level model in
// plans/inventory_service/ §3, and that is a separate decision, not implied by having a list of them.
//
// Scoped to the warehouse, which IS a team: `team_id` carries (use_scope) and every query is
// constrained to it, so one warehouse can never read or mutate another's racks by id. Only warehouse
// teams have racks at all — a selling team has nowhere to put a shelf.
service RackService {
  rpc RackCreate(RackCreateRequest) returns (RackCreateResponse);
  rpc RackList(RackListRequest) returns (RackListResponse);
  // One rack in full, for the detail page (#138).
  rpc RackDetail(RackDetailRequest) returns (RackDetailResponse);
  // What is physically ON one rack, and how much of it (#138).
  rpc RackStock(RackStockRequest) returns (RackStockResponse);
  rpc RackUpdate(RackUpdateRequest) returns (RackUpdateResponse);
  rpc RackDelete(RackDeleteRequest) returns (RackDeleteResponse);
}

message Rack {
  uint64 id = 1;
  // The warehouse team this rack stands in.
  uint64 warehouse_id = 2;
  // What is painted on it — the label someone reads off the shelf ("A-01-3"). Unique per warehouse
  // among active racks.
  string code = 3;
  // An optional human name ("Receiving bay", "Cold room 2") for when the code alone is not obvious.
  string name = 4;
  string description = 5;
  bool deleted = 6;
}

message RackCreateRequest {
  // Write: the warehouse's own managers. Team-level roles are legal because team_id carries use_scope.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  string code = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
  string name = 3 [(buf.validate.field).string.max_len = 200];
  string description = 4 [(buf.validate.field).string.max_len = 500];
}

message RackCreateResponse {
  Rack rack = 1;
}

message RackListRequest {
  // Read: anyone who works in the warehouse, staff included — they are the ones standing at the rack.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  string q = 2 [(buf.validate.field).string.max_len = 100];
  warehouse.common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message RackListResponse {
  repeated Rack racks = 1;
  warehouse.common.v1.PageInfo page_info = 2;
}

message RackDetailRequest {
  // Read: anyone who works in the warehouse, staff included — same as RackList.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  // A rack of another warehouse reads as NotFound — the scope IS the WHERE clause.
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message RackDetailResponse {
  Rack rack = 1;
}

// One product sitting on a rack, and how many (#138).
message RackStockLine {
  // Opaque product_service id. The product may belong to ANOTHER team's catalogue — a warehouse holds
  // other teams' goods — so its sku/name are resolved separately (ProductByIds), never assumed to be
  // in this warehouse's own catalogue.
  uint64 product_id = 1;
  // How many of it are on THIS rack. Not the warehouse's total for the product, which is a SUM across
  // the product's racks and a different question (StockList).
  int64 on_hand = 2;
}

message RackStockRequest {
  // Read: anyone who works in the warehouse, staff included — they are the ones standing at the rack.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN,
      ROLE_WAREHOUSE_STAFF
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];
  // A rack's contents grow with the catalogue, so this pages: it is a browse/management screen, not a
  // picker feed (HARD RULE 9).
  warehouse.common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message RackStockResponse {
  repeated RackStockLine lines = 1;
  warehouse.common.v1.PageInfo page_info = 2;
}

message RackUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];

  // Absent = leave alone. Present = write it.
  optional string code = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
  }];
  optional string name = 4 [(buf.validate.field).string.max_len = 200];
  optional string description = 5 [(buf.validate.field).string.max_len = 500];
}

message RackUpdateResponse {
  Rack rack = 1;
}

message RackDeleteRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message RackDeleteResponse {}
