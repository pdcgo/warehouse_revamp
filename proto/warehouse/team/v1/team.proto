syntax = "proto3";

package warehouse.team.v1;

import "buf/validate/validate.proto";
import "warehouse/common/v1/page.proto";
import "warehouse/role_base/v1/role.proto";

option go_package = "github.com/pdcgo/warehouse_revamp/backend/gen/warehouse/team/v1;teamv1";

// TeamService owns `teams` and `team_infos`.
//
// Its most important RPC is TeamByIds: it is how every OTHER service turns a team_id it stores
// locally into a name and a type WITHOUT touching this service's database. Per-service
// independence forbids a cross-service SQL join; this is the replacement.
service TeamService {
  rpc TeamCreate(TeamCreateRequest) returns (TeamCreateResponse);
  rpc TeamUpdate(TeamUpdateRequest) returns (TeamUpdateResponse);
  rpc TeamDelete(TeamDeleteRequest) returns (TeamDeleteResponse);
  rpc TeamList(TeamListRequest) returns (TeamListResponse);
  rpc TeamDetail(TeamDetailRequest) returns (TeamDetailResponse);

  // TeamByIds bulk-resolves teams. Unknown and soft-deleted ids are OMITTED from the map —
  // callers must check for presence, never index blindly.
  rpc TeamByIds(TeamByIdsRequest) returns (TeamByIdsResponse);

  rpc TeamInfoUpdate(TeamInfoUpdateRequest) returns (TeamInfoUpdateResponse);

  // WarehouseInfoDetail returns a warehouse's weekly hours (operating + receiving-orders).
  // Any authenticated caller: a selling team legitimately needs to know when a warehouse can
  // receive its orders. Days with no stored row default to closed.
  rpc WarehouseInfoDetail(WarehouseInfoDetailRequest) returns (WarehouseInfoDetailResponse);

  // WarehouseInfoUpdate replaces a warehouse's weekly hours. Warehouse managers edit their own.
  rpc WarehouseInfoUpdate(WarehouseInfoUpdateRequest) returns (WarehouseInfoUpdateResponse);
}

// Weekday is 1..7 Monday..Sunday. The UNSPECIFIED zero is required by proto3 and is never a
// valid schedule row.
enum Weekday {
  WEEKDAY_UNSPECIFIED = 0;
  WEEKDAY_MONDAY = 1;
  WEEKDAY_TUESDAY = 2;
  WEEKDAY_WEDNESDAY = 3;
  WEEKDAY_THURSDAY = 4;
  WEEKDAY_FRIDAY = 5;
  WEEKDAY_SATURDAY = 6;
  WEEKDAY_SUNDAY = 7;
}

// DayHours is one weekday's open/close. `open` false means closed that day (times ignored).
// Times are "HH:MM" 24-hour local wall-clock, validated by the handler.
message DayHours {
  Weekday weekday = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  bool open = 2;
  string open_time = 3 [(buf.validate.field).string.max_len = 5];
  string close_time = 4 [(buf.validate.field).string.max_len = 5];
}

// WarehouseInfo is a warehouse team's two weekly schedules.
message WarehouseInfo {
  uint64 team_id = 1;

  // When the warehouse is generally open.
  repeated DayHours operating_hours = 2;

  // When the warehouse can RECEIVE ORDERS — often narrower than operating hours.
  repeated DayHours receiving_hours = 3;
}

message WarehouseInfoDetailRequest {
  option (warehouse.role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message WarehouseInfoDetailResponse {
  WarehouseInfo info = 1;
}

message WarehouseInfoUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];

  // A full replacement of each schedule — the editor sends the whole weekly grid. At most one
  // row per weekday per schedule; the handler rejects duplicates and bad times.
  repeated DayHours operating_hours = 2 [(buf.validate.field).repeated.max_items = 7];
  repeated DayHours receiving_hours = 3 [(buf.validate.field).repeated.max_items = 7];
}

message WarehouseInfoUpdateResponse {
  WarehouseInfo info = 1;
}

// THE canonical TeamType — declared ONCE, here, by the service that owns the teams table.
// Never redeclare it in another package.
//
// The numbers deliberately match no legacy numbering: nothing persists them (the column is
// TEXT with a CHECK), so a raw int carried over from old code produces an obviously wrong
// value rather than a plausible, silently-swapped one.
enum TeamType {
  TEAM_TYPE_UNSPECIFIED = 0;
  TEAM_TYPE_ROOT = 1;
  TEAM_TYPE_ADMIN = 2;
  TEAM_TYPE_WAREHOUSE = 3;
  TEAM_TYPE_SELLING = 4;
}

message TeamInfo {
  uint64 team_id = 1;
  string contact_number = 2;
  string bank_type = 3;
  string bank_owner_name = 4;
  string bank_account_number = 5;

  // Opaque ids owned by other services. Not validated here — no FK is possible across a
  // service boundary. 0 = unset.
  uint64 return_warehouse_id = 6;
  uint64 return_user_id = 7;
}

message Team {
  uint64 id = 1;
  TeamType type = 2;
  string name = 3;
  string team_code = 4;
  string description = 5;
  bool deleted = 6;

  // Populated on TeamDetail only. TeamList and TeamByIds leave it unset.
  TeamInfo info = 7;

  // A compact team picture (like a user avatar). Empty when the team has no picture. Set via
  // TeamUpdate after a two-phase document upload; the app shows initials as a fallback.
  string image_url = 8;
}

message TeamCreateRequest {
  // Unscoped on purpose: there is no team to scope to yet.
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  TeamType type = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [
      0,
      1
    ]
  }];
  string name = 2 [(buf.validate.field).string = {
    min_len: 4
    max_len: 128
  }];
  string team_code = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 10
  }];
  string description = 4 [(buf.validate.field).string = {max_len: 300}];
}

message TeamCreateResponse {
  Team team = 1;
}

message TeamUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  // use_scope is LOAD-BEARING: without it, the roles above are evaluated against team 1, and
  // the team/warehouse OWNER and ADMIN entries become dead letters — the policy would claim a
  // team manager may edit their team while the system silently required root/admin.
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];

  // Absent = leave alone. `type` and `team_code` are immutable after create.
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 4
    max_len: 128
  }];
  optional string description = 3 [(buf.validate.field).string = {max_len: 300}];

  // The compact team picture URL (see Team.image_url). Present & empty = clear it.
  optional string image_url = 4 [(buf.validate.field).string.max_len = 1024];
}

message TeamUpdateResponse {
  Team team = 1;
}

message TeamDeleteRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message TeamDeleteResponse {}

message TeamListRequest {
  option (warehouse.role_base.v1.request_policy) = {allow_only_authenticated: true};

  string q = 1 [(buf.validate.field).string.max_len = 100];
  TeamType team_type = 2;
  warehouse.common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message TeamListResponse {
  repeated Team teams = 1;
  warehouse.common.v1.PageInfo page_info = 2;
}

message TeamDetailRequest {
  option (warehouse.role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message TeamDetailResponse {
  Team team = 1;
}

message TeamByIdsRequest {
  // Deliberately UNSCOPED: this is a cross-team bulk lookup. Scoping it would defeat it.
  option (warehouse.role_base.v1.request_policy) = {allow_only_authenticated: true};

  repeated uint64 ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 200
    unique: true
    items: {
      uint64: {gt: 0}
    }
  }];
}

message TeamByIdsResponse {
  // Keyed by team id. Unknown AND soft-deleted ids are OMITTED — check presence, do not index
  // blindly. The map is never nil, so ranging an empty result is safe.
  map<uint64, Team> data = 1;
}

message TeamInfoUpdateRequest {
  option (warehouse.role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN,
      ROLE_WAREHOUSE_OWNER,
      ROLE_WAREHOUSE_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (warehouse.role_base.v1.use_scope) = true
  ];

  // ALL optional — explicit presence. Absent = leave alone. Present = write it, including
  // present-and-zero = clear. Without presence there is no way to say "don't touch this", and
  // a contact-number-only update silently blanks the bank details.
  optional string contact_number = 2 [(buf.validate.field).string.max_len = 40];
  optional string bank_type = 3 [(buf.validate.field).string.max_len = 60];
  optional string bank_owner_name = 4 [(buf.validate.field).string.max_len = 128];
  optional string bank_account_number = 5 [(buf.validate.field).string.max_len = 60];
  optional uint64 return_warehouse_id = 6; // present & 0 = clear to NULL
  optional uint64 return_user_id = 7; // present & 0 = clear to NULL
}

message TeamInfoUpdateResponse {
  TeamInfo info = 1;
}
